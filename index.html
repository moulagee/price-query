<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分包价格快速查询</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #333;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 30px 0 20px;
    }

    .logo { font-size: 60px; margin-bottom: 10px; }
    .header h1 {
      font-size: 26px;
      color: #fff;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .header p { color: #888; font-size: 14px; }

    /* 统计卡片 */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .stat-num {
      font-size: 28px;
      font-weight: bold;
      color: #4ecdc4;
      margin-bottom: 6px;
    }

    .stat-num.personal { color: #4ecdc4; }
    .stat-num.company { color: #ff6b6b; }

    .stat-label {
      font-size: 12px;
      color: #888;
    }

    /* 搜索框 */
    .search-box {
      display: flex;
      background: #fff;
      border-radius: 50px;
      padding: 6px 6px 6px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
      height: 44px;
    }

    .search-box input::placeholder { color: #aaa; }

    .search-btn {
      width: 50px;
      height: 44px;
      background: #4ecdc4;
      border: none;
      border-radius: 22px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .search-btn:hover { background: #3dbdb5; }

    /* 筛选 */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 12px;
      color: #888;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: rgba(78,205,196,0.15);
      border-color: #4ecdc4;
      color: #4ecdc4;
    }

    .filter-btn .icon { margin-right: 6px; }

    /* 热门搜索 */
    .hot-section {
      margin-bottom: 16px;
    }

    .hot-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .hot-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .hot-tag {
      background: rgba(255,255,255,0.08);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s;
    }

    .hot-tag:hover {
      background: rgba(78,205,196,0.2);
      color: #4ecdc4;
      border-color: #4ecdc4;
    }

    /* 搜索历史 */
    .history-section {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-header span { font-size: 14px; color: #888; }
    .history-clear { color: #ff6b6b !important; cursor: pointer; font-size: 12px !important; }

    .history-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .history-tag {
      background: rgba(255,255,255,0.05);
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .history-tag:hover { color: #4ecdc4; border-color: #4ecdc4; }

    /* 结果统计 */
    .result-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .result-stats .count {
      font-size: 15px;
      color: #4ecdc4;
      font-weight: bold;
    }

    .result-stats .tip {
      font-size: 12px;
      color: #666;
    }

    /* 结果列表 */
    .result-item {
      background: rgba(255,255,255,0.97);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .result-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .item-name {
      flex: 1;
      font-size: 16px;
      font-weight: bold;
      color: #1a1a2e;
      margin-right: 10px;
      line-height: 1.4;
    }

    .source-tag {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .source-tag.personal { background: #4ecdc4; color: #fff; }
    .source-tag.company { background: #ff6b6b; color: #fff; }
    .source-tag.region { background: #9b59b6; color: #fff; }

    .item-body {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }

    .item-price { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .item-unit { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .item-project { display: flex; align-items: flex-start; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .item-contract { display: flex; align-items: flex-start; gap: 6px; margin-top: 2px; flex-wrap: wrap; }

    .item-label { font-size: 13px; color: #888; flex-shrink: 0; }
    .item-value { font-size: 13px; font-weight: normal; line-height: 1.5; word-break: break-all; }
    .item-project .item-value { color: #4ecdc4; }
    .item-contract .item-value { color: #7f8c8d; font-size: 12px; }
    .price-val { color: #ff9500; font-weight: bold; }
    .unit-val { color: #555; font-weight: bold; }

    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }

    .match-tag {
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
    }

    .match-tag.exact { background: #e8f5e9; color: #4caf50; }
    .match-tag.fuzzy { background: #f5f5f5; color: #888; }

    .copy-btn {
      padding: 6px 16px;
      background: #f5f5f5;
      border-radius: 14px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .copy-btn:hover { background: #4ecdc4; color: #fff; }
    .copy-btn.copied { background: #4caf50; color: #fff; }

    /* 空/加载/错误状态 */
    .empty-state, .loading-state, .error-state, .init-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }

    .empty-icon, .error-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-text, .error-text { font-size: 18px; color: #888; margin-bottom: 8px; }
    .error-text { color: #ff6b6b !important; }
    .empty-tip, .error-tip { font-size: 14px; color: #555; }

    .loading-text { font-size: 16px; color: #4ecdc4; }

    /* 加载更多 */
    .load-more {
      text-align: center;
      padding: 20px;
      color: #4ecdc4;
      font-size: 14px;
      cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 15px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show { opacity: 1; }

    /* 说明 */
    .tips {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-top: 24px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tips-title { font-size: 14px; color: #888; margin-bottom: 12px; }

    .tips-item {
      font-size: 13px;
      color: #666;
      line-height: 2;
      padding-left: 16px;
      position: relative;
    }

    .tips-item::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #4ecdc4;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .container { padding: 16px; }
      .stats-row { gap: 8px; }
      .stat-num { font-size: 22px; }
      .item-body { flex-direction: column; gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="logo">🏗️</div>
      <h1>分包价格快速查询</h1>
      <p>本地数据库 · 毫秒级搜索 · 5295条价格数据</p>
    </div>

    <!-- 统计 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">加载中...</div>
        <div class="stat-label">数据总量</div>
      </div>
      <div class="stat-card">
        <div class="stat-num personal" id="personalCount">-</div>
        <div class="stat-label">个人分包库</div>
      </div>
      <div class="stat-card">
        <div class="stat-num company" id="companyCount">-</div>
        <div class="stat-label">公司定额库</div>
      </div>
    </div>

    <!-- 搜索框 -->
    <div class="search-box">
      <input
        id="searchInput"
        type="text"
        placeholder="输入关键词（如：真石漆、防水、抹灰...）"
        onkeydown="if(event.key==='Enter')doSearch()"
      >
      <button class="search-btn" onclick="doSearch()">🔍</button>
    </div>

    <!-- 筛选 -->
    <div class="filter-row">
      <div class="filter-btn active" id="filterPersonal" onclick="toggleFilter('personal')">
        <span class="icon">📊</span>个人分包库
      </div>
      <div class="filter-btn active" id="filterCompany" onclick="toggleFilter('company')">
        <span class="icon">🏢</span>公司定额库
      </div>
      <div class="filter-btn active" id="filterRegion" onclick="toggleFilter('personal_region')">
        <span class="icon">📋</span>区域联采库
      </div>
    </div>

    <!-- 热门搜索 -->
    <div class="hot-section" id="hotSection">
      <div class="hot-title">🔥 热门搜索</div>
      <div class="hot-tags">
        <span class="hot-tag" onclick="hotSearch('真石漆')">真石漆</span>
        <span class="hot-tag" onclick="hotSearch('防水')">防水</span>
        <span class="hot-tag" onclick="hotSearch('抹灰')">抹灰</span>
        <span class="hot-tag" onclick="hotSearch('砌筑')">砌筑</span>
        <span class="hot-tag" onclick="hotSearch('钢筋')">钢筋</span>
        <span class="hot-tag" onclick="hotSearch('混凝土')">混凝土</span>
        <span class="hot-tag" onclick="hotSearch('保温')">保温</span>
        <span class="hot-tag" onclick="hotSearch('脚手架')">脚手架</span>
      </div>
    </div>

    <!-- 搜索历史 -->
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header">
        <span>🕐 搜索历史</span>
        <span class="history-clear" onclick="clearHistory()">清除</span>
      </div>
      <div class="history-tags" id="historyTags"></div>
    </div>

    <!-- 结果统计 -->
    <div id="resultStats" style="display:none" class="result-stats">
      <span class="count" id="resultCount">0</span>
      <span class="tip">条结果</span>
    </div>

    <!-- 结果列表 -->
    <div id="resultList"></div>

    <!-- 加载更多 -->
    <div class="load-more" id="loadMore" style="display:none" onclick="loadMore()">
      加载更多 ↓
    </div>

    <!-- 说明 -->
    <div class="tips">
      <div class="tips-title">💡 使用说明</div>
      <div class="tips-item">精准匹配：以关键词开头或完全一致的结果</div>
      <div class="tips-item">模糊匹配：包含关键词的结果</div>
      <div class="tips-item">点击「复制」可一键复制整行信息</div>
      <div class="tips-item">切换数据源筛选，查看不同数据库</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="data.js" onerror="console.error('data.js加载失败！请刷新页面重试')"></script>
  <script>
    // ========== 全局状态 ==========
    let filterPersonal = true
    let filterCompany = true
    let filterRegion = true
    let currentResults = []
    let pageSize = 50
    let currentPage = 1
    let history = JSON.parse(localStorage.getItem('priceSearchHistory') || '[]')

    // ========== 初始化 ==========
    function init() {
      const data = window.PRICE_DATA || []

      if (!data || data.length === 0) {
        document.getElementById('totalCount').textContent = '加载失败'
        console.error('数据加载失败！请检查网络后刷新页面重试。')
        return
      }

      const personal = data.filter(d => d.source === 'personal').length
      const company = data.filter(d => d.source === 'company').length

      document.getElementById('totalCount').textContent = data.length.toLocaleString()
      document.getElementById('personalCount').textContent = personal.toLocaleString()
      document.getElementById('companyCount').textContent = company.toLocaleString()

      renderHistory()
    }

    // ========== 搜索 ==========
    function doSearch() {
      const keyword = document.getElementById('searchInput').value.trim()
      if (!keyword) {
        showToast('请输入关键词')
        return
      }

      // 保存历史
      saveHistory(keyword)

      // 执行搜索
      currentPage = 1
      const results = searchData(keyword)
      currentResults = results
      renderResults(keyword, results, true)

      // 隐藏热门搜索，显示历史
      document.getElementById('hotSection').style.display = 'none'
    }

    function searchData(keyword) {
      const data = window.PRICE_DATA || []
      const kw = keyword.toLowerCase()

      let filtered = data.filter(item => {
        const nameLower = (item.name_lower || '').toLowerCase()
        const match = nameLower.includes(kw)
        if (!match) return false

        // 筛选来源
        if (!filterPersonal && item.source === 'personal') return false
        if (!filterCompany && item.source === 'company') return false
        if (!filterRegion && item.source === 'personal_region') return false
        return true
      })

      // 排序：精准匹配优先
      filtered.sort((a, b) => {
        const aExact = a.name_lower === kw || (a.name_lower || '').startsWith(kw)
        const bExact = b.name_lower === kw || (b.name_lower || '').startsWith(kw)
        if (aExact && !bExact) return -1
        if (!aExact && bExact) return 1
        return 0
      })

      return filtered
    }

    function renderResults(keyword, results, isNew) {
      const list = document.getElementById('resultList')
      const stats = document.getElementById('resultStats')
      const loadMore = document.getElementById('loadMore')

      if (results.length === 0) {
        stats.style.display = 'none'
        loadMore.style.display = 'none'
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">未找到匹配结果</div>
            <div class="empty-tip">请尝试其他关键词</div>
          </div>
        `
        return
      }

      // 显示统计
      stats.style.display = 'flex'
      document.getElementById('resultCount').textContent = results.length.toLocaleString()

      // 分页显示
      const start = 0
      const end = isNew ? Math.min(pageSize, results.length) : currentPage * pageSize
      const displayResults = results.slice(start, end)

      const html = displayResults.map(item => {
        const matchType = (item.name_lower === keyword.toLowerCase() ||
                          (item.name_lower || '').startsWith(keyword.toLowerCase()))
                          ? 'exact' : 'fuzzy'

        let priceText = ''
        if (item.minPrice === item.maxPrice || item.maxPrice === 0) {
          priceText = `${item.avgPrice} 元`
        } else {
          priceText = `${item.minPrice} ~ ${item.maxPrice} 元`
        }

        const projectsStr = item.projects && item.projects.length > 0 ? item.projects.join('、') : ''
        const contractsStr = item.contracts && item.contracts.length > 0 ? item.contracts.join('、') : ''
        const copyText = `${item.name} | ${item.unit} | ${priceText}${projectsStr ? ' | 项目:' + projectsStr : ''}${contractsStr ? ' | 合同:' + contractsStr : ''}`

        const projectText = item.projects && item.projects.length > 0
          ? `<div class="item-project"><span class="item-label">项目：</span><span class="item-value">${escapeHtml(item.projects.join('、'))}</span></div>`
          : ''
        const contractText = item.contracts && item.contracts.length > 0
          ? `<div class="item-contract"><span class="item-label">合同：</span><span class="item-value">${escapeHtml(item.contracts.join('、'))}</span></div>`
          : ''

        return `
          <div class="result-item">
            <div class="item-header">
              <div class="item-name">${escapeHtml(item.name)}</div>
              <span class="source-tag ${item.source === 'personal' ? 'personal' : item.source === 'personal_region' ? 'region' : 'company'}">
                ${item.source === 'personal' ? '个人库' : item.source === 'personal_region' ? '区域联采' : '公司库'}
              </span>
            </div>
            <div class="item-body">
              <div class="item-price">
                <span class="item-label">价格：</span>
                <span class="item-value price-val">${escapeHtml(priceText)}</span>
              </div>
              <div class="item-unit">
                <span class="item-label">单位：</span>
                <span class="item-value unit-val">${escapeHtml(item.unit)}</span>
              </div>
              ${projectText}
              ${contractText}
            </div>
            <div class="item-footer">
              <span class="match-tag ${matchType}">${matchType === 'exact' ? '🎯 精准匹配' : '🔎 模糊匹配'}</span>
              <button class="copy-btn" onclick="copyText('${escapeHtml(copyText).replace(/'/g, "\\'")}', this)">📋 复制</button>
            </div>
          </div>
        `
      }).join('')

      list.innerHTML = html

      // 加载更多
      if (results.length > end) {
        loadMore.style.display = 'block'
        currentPage = isNew ? 1 : currentPage
      } else {
        loadMore.style.display = 'none'
      }
    }

    function loadMore() {
      currentPage++
      const kw = document.getElementById('searchInput').value.trim()
      renderResults(kw, currentResults, false)
    }

    function hotSearch(keyword) {
      document.getElementById('searchInput').value = keyword
      doSearch()
    }

    // ========== 筛选 ==========
    function toggleFilter(type) {
      if (type === 'personal') filterPersonal = !filterPersonal
      else if (type === 'company') filterCompany = !filterCompany
      else if (type === 'personal_region') filterRegion = !filterRegion

      document.getElementById('filterPersonal').className =
        'filter-btn' + (filterPersonal ? ' active' : '')
      document.getElementById('filterCompany').className =
        'filter-btn' + (filterCompany ? ' active' : '')
      document.getElementById('filterRegion').className =
        'filter-btn' + (filterRegion ? ' active' : '')

      // 重新搜索
      const kw = document.getElementById('searchInput').value.trim()
      if (kw) {
        currentResults = searchData(kw)
        renderResults(kw, currentResults, true)
      }
    }

    // ========== 历史 ==========
    function saveHistory(keyword) {
      history = history.filter(h => h !== keyword)
      history.unshift(keyword)
      if (history.length > 10) history = history.slice(0, 10)
      localStorage.setItem('priceSearchHistory', JSON.stringify(history))
      renderHistory()
    }

    function renderHistory() {
      const section = document.getElementById('historySection')
      const tags = document.getElementById('historyTags')

      if (history.length === 0) {
        section.style.display = 'none'
        return
      }

      section.style.display = 'block'
      tags.innerHTML = history.map(h =>
        `<span class="history-tag" onclick="historySearch('${escapeHtml(h).replace(/'/g, "\\'")}')">${escapeHtml(h)}</span>`
      ).join('')
    }

    function historySearch(keyword) {
      document.getElementById('searchInput').value = keyword
      doSearch()
    }

    function clearHistory() {
      history = []
      localStorage.removeItem('priceSearchHistory')
      renderHistory()
    }

    // ========== 工具 ==========
    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✅ 已复制'
        btn.className = 'copy-btn copied'
        showToast('已复制到剪贴板')
        setTimeout(() => {
          btn.textContent = '📋 复制'
          btn.className = 'copy-btn'
        }, 2000)
      }).catch(() => {
        showToast('复制失败，请手动复制')
      })
    }

    function showToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.className = 'toast show'
      setTimeout(() => { toast.className = 'toast' }, 2000)
    }

    function escapeHtml(str) {
      if (!str) return ''
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    // ========== 启动 ==========
    init()
  </script>
</body>
